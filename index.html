<!DOCTYPE html>
<html>

<head>

<title>Agent Workflow</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

font-family:'Segoe UI',sans-serif;
margin:0;
min-height:100vh;

background:
radial-gradient(circle at 15% 20%, #2d1e3f 0%, transparent 40%),
radial-gradient(circle at 85% 30%, #1e2a44 0%, transparent 40%),
radial-gradient(circle at 40% 85%, #2b3a3f 0%, transparent 40%),
#0f0f17;

color:#e6e6f0;

}


/* layout */

.container{

max-width:1100px;
margin:auto;
padding:35px;

}


h1{

text-align:center;
color:#cdb4ff;
letter-spacing:1px;
margin-bottom:5px;

}


.subtitle{

text-align:center;
color:#9f9fb3;
margin-bottom:35px;

}


/* input */

.input-box{

display:flex;
gap:12px;
margin-bottom:35px;

}


input{

flex:1;

padding:15px;

font-size:16px;

border-radius:12px;

border:1px solid rgba(255,255,255,0.08);

background:rgba(255,255,255,0.04);

color:#e6e6f0;

outline:none;

transition:0.3s;

}


input:focus{

border:1px solid #b8c0ff;

box-shadow:0 0 8px rgba(184,192,255,0.3);

}


/* button */

button{

padding:15px 25px;

border:none;

border-radius:12px;

background:linear-gradient(135deg,#7b6ef6,#b8c0ff);

color:white;

font-size:15px;

cursor:pointer;

transition:0.3s;

letter-spacing:0.5px;

}


button:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(123,110,246,0.4);

}


/* workflow */

.workflow{

display:flex;
flex-wrap:wrap;

justify-content:center;

gap:12px;

margin-bottom:35px;

}


.step{

padding:10px 18px;

border-radius:20px;

font-size:13px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

color:#cdb4ff;

animation:fadeIn 0.7s ease;

}


/* cards */

.card{

background:rgba(255,255,255,0.04);

border-radius:18px;

padding:22px;

margin-bottom:25px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:0 8px 25px rgba(0,0,0,0.3);

transition:0.3s;

animation:slideUp 0.6s ease;

}


.card:hover{

transform:translateY(-4px);

box-shadow:0 14px 40px rgba(0,0,0,0.5);

}


.card h3{

margin-top:0;

color:#b8c0ff;

font-weight:500;

}


.loading{

display:none;

text-align:center;

margin:25px;

color:#cdb4ff;

font-size:14px;

letter-spacing:1px;

animation:pulse 1.2s infinite;

}


pre{

white-space:pre-wrap;

color:#e6e6f0;

}


/* responsive */

@media(max-width:700px){

.input-box{

flex-direction:column;

}

h1{

font-size:24px;

}

}


/* animations */

@keyframes slideUp{

from{

transform:translateY(25px);

opacity:0;

}

to{

transform:translateY(0);

opacity:1;

}

}


@keyframes fadeIn{

from{

opacity:0;

}

to{

opacity:1;

}

}


@keyframes pulse{

0%{opacity:0.4;}

50%{opacity:1;}

100%{opacity:0.4;}

}

</style>
</head>


<body>


<div class="container">


<h1>Agent-Orchestration Workflow</h1>


<p class="subtitle">

Research → Summarize → Compose Email

</p>



<div class="input-box">

<input id="topic" placeholder="Enter topic (eg: Artificial Intelligence)">


<button onclick="sendData()">

Run Workflow

</button>


</div>



<div class="workflow">

<div class="step">User Input</div>

<div class="step">Research Agent</div>

<div class="step">Summarizer Agent</div>

<div class="step">Email Agent</div>

</div>



<div class="loading" id="loading">

Processing agents...

</div>



<div class="card">

<h3>📚 Research Output</h3>

<p id="research">

Waiting for input...

</p>

</div>



<div class="card">

<h3>📝 Summary Output</h3>

<p id="summary">

Waiting for input...

</p>

</div>



<div class="card">

<h3>📧 Email Output</h3>

<pre id="email">

Waiting for input...

</pre>

</div>



</div>



<script>

async function sendData(){

document.getElementById("loading").style.display="block"


topic=document.getElementById("topic").value


response=await fetch("/process",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

topic:topic

})

})


data=await response.json()


document.getElementById("loading").style.display="none"


document.getElementById("research").innerText=data.research


document.getElementById("summary").innerText=data.summary


document.getElementById("email").innerText=data.email

}

</script>



</body>

</html>
